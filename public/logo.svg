<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 340" width="300" height="340">
  <defs>
    <linearGradient id="pinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1D4ED8" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Card background -->
  <rect width="300" height="340" rx="28" fill="url(#bgGrad)"/>

  <!-- Pin drop shadow -->
  <ellipse cx="150" cy="226" rx="28" ry="7" fill="#94A3B8" opacity="0.35"/>

  <!-- Map pin shape -->
  <path d="M 150 222 C 128 196 72 160 72 108 A 78 78 0 1 1 228 108 C 228 160 172 196 150 222 Z"
        fill="url(#pinGrad)" filter="url(#shadow)"/>

  <!-- Inner white circle -->
  <circle cx="150" cy="108" r="57" fill="white"/>

  <!-- City skyline inside -->
  <!-- Building 1 — far left, short -->
  <rect x="97"  y="100" width="13" height="26" rx="2" fill="#93C5FD"/>

  <!-- Building 2 — left, medium -->
  <rect x="114" y="91"  width="13" height="35" rx="2" fill="#3B82F6"/>
  <rect x="117" y="95"  width="4"  height="4"  rx="0.5" fill="white" opacity="0.75"/>
  <rect x="117" y="102" width="4"  height="4"  rx="0.5" fill="white" opacity="0.75"/>

  <!-- Building 3 — center, tallest -->
  <rect x="132" y="82"  width="16" height="44" rx="2" fill="#1D4ED8"/>
  <rect x="135" y="86"  width="4"  height="4"  rx="0.5" fill="white" opacity="0.75"/>
  <rect x="141" y="86"  width="4"  height="4"  rx="0.5" fill="white" opacity="0.75"/>
  <rect x="135" y="94"  width="4"  height="4"  rx="0.5" fill="white" opacity="0.75"/>
  <rect x="141" y="94"  width="4"  height="4"  rx="0.5" fill="white" opacity="0.75"/>

  <!-- Building 4 — right, medium -->
  <rect x="153" y="88"  width="14" height="38" rx="2" fill="#2563EB"/>
  <rect x="156" y="92"  width="4"  height="4"  rx="0.5" fill="white" opacity="0.75"/>
  <rect x="156" y="100" width="4"  height="4"  rx="0.5" fill="white" opacity="0.75"/>

  <!-- Building 5 — far right, short -->
  <rect x="172" y="98"  width="12" height="28" rx="2" fill="#60A5FA"/>

  <!-- Ground line -->
  <rect x="93" y="126" width="94" height="3" rx="1.5" fill="#BFDBFE"/>

  <!-- AI sparkle badge (top-right of pin) -->
  <circle cx="213" cy="65" r="17" fill="#FCD34D"/>
  <path d="M 213 52 L 215 61 L 224 63 L 215 65 L 213 74 L 211 65 L 202 63 L 211 61 Z"
        fill="#F59E0B"/>

  <!-- Wordmark: CityFix -->
  <text x="150" y="267"
        text-anchor="middle"
        font-family="Arial Black, Arial, sans-serif"
        font-weight="900"
        font-size="42"
        fill="#0F172A"
        letter-spacing="-1">CityFix</text>

  <!-- AI pill -->
  <rect x="113" y="278" width="74" height="32" rx="16" fill="#2563EB"/>
  <text x="150" y="300"
        text-anchor="middle"
        font-family="Arial, sans-serif"
        font-weight="700"
        font-size="17"
        fill="white"
        letter-spacing="6">AI</text>
</svg>
